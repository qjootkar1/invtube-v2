<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvTube</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
:root {
  --bg:#0f0f0f; --bg2:#181818; --bg3:#222; --border:#333;
  --text:#f1f1f1; --text2:#aaa; --accent:#ff0000; --radius:10px;
  --font:'Space Grotesk','Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
header{position:sticky;top:0;z-index:100;background:rgba(15,15,15,.95);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  height:60px;display:flex;align-items:center;padding:0 16px;gap:16px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none;color:var(--text)}
.logo-icon{width:36px;height:26px;background:var(--accent);border-radius:6px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;padding-left:2px}
.logo-text{font-size:18px;font-weight:700}
.logo-text span{color:var(--accent)}
.search-bar{flex:1;max-width:600px;display:flex;margin:0 auto}
.search-bar input{flex:1;background:var(--bg3);border:1.5px solid var(--border);
  border-right:none;border-radius:var(--radius) 0 0 var(--radius);
  color:var(--text);padding:0 16px;font-size:14px;font-family:var(--font);
  height:40px;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:#555}
.search-bar input::placeholder{color:var(--text2)}
.search-bar button{background:var(--bg3);border:1.5px solid var(--border);border-left:none;
  border-radius:0 var(--radius) var(--radius) 0;color:var(--text);padding:0 16px;
  cursor:pointer;font-size:16px;height:40px;transition:background .2s}
.search-bar button:hover{background:var(--bg2)}
#app{padding:24px 16px;max-width:1400px;margin:0 auto}
.page-title{font-size:18px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px;font-weight:500}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.video-card{cursor:pointer;border-radius:var(--radius);overflow:hidden;
  transition:transform .2s,box-shadow .2s;background:var(--bg2)}
.video-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#1a1a1a}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.video-card:hover .thumb-wrap img{transform:scale(1.04)}
.duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);
  color:#fff;font-size:11px;font-weight:600;padding:2px 5px;border-radius:4px}
.card-info{padding:10px 12px 12px}
.card-title{font-size:13.5px;font-weight:500;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.card-meta{font-size:12px;color:var(--text2)}
.card-meta span+span::before{content:' · '}
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-card{background:var(--bg2);border-radius:var(--radius);overflow:hidden}
.sk-thumb{width:100%;aspect-ratio:16/9}
.sk-info{padding:10px 12px}
.sk-t1{height:14px;margin-bottom:8px}
.sk-t2{height:14px;width:70%;margin-bottom:10px}
.sk-t3{height:11px;width:50%}
.video-layout{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start}
@media(max-width:900px){.video-layout{grid-template-columns:1fr}}
.player-wrap{width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--radius);
  overflow:hidden;position:relative}
.player-wrap video{width:100%;height:100%;background:#000}
.player-loading{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#000;gap:16px}
.spinner{width:48px;height:48px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.player-loading p{color:var(--text2);font-size:14px}
.video-info{padding:16px 0}
.video-title-h{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:10px}
.video-meta-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.video-meta-row span{font-size:13px;color:var(--text2)}
.quality-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.quality-btn{background:var(--bg3);border:1.5px solid var(--border);color:var(--text);
  padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:var(--font)}
.quality-btn:hover,.quality-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.desc-box{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;
  font-size:13px;line-height:1.6;color:var(--text2);max-height:80px;
  overflow:hidden;position:relative;cursor:pointer;transition:max-height .3s}
.desc-box.expanded{max-height:500px}
.desc-box::after{content:'더보기 ▾';position:absolute;bottom:8px;right:12px;
  font-size:11px;color:var(--text);background:var(--bg2);padding:2px 4px}
.desc-box.expanded::after{content:'접기 ▴'}
.rec-list{display:flex;flex-direction:column;gap:10px}
.rec-card{display:flex;gap:10px;cursor:pointer;padding:6px;border-radius:8px;transition:background .15s}
.rec-card:hover{background:var(--bg2)}
.rec-thumb{width:160px;flex-shrink:0;aspect-ratio:16/9;border-radius:6px;
  overflow:hidden;background:#1a1a1a;position:relative}
.rec-thumb img{width:100%;height:100%;object-fit:cover}
.rec-dur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);
  color:#fff;font-size:10px;font-weight:600;padding:1px 4px;border-radius:3px}
.rec-info{flex:1;min-width:0}
.rec-title{font-size:13px;font-weight:500;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.rec-meta{font-size:11px;color:var(--text2)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg3);color:var(--text);padding:10px 20px;border-radius:8px;
  font-size:13px;z-index:9999;transition:transform .3s;border:1px solid var(--border);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
.err-box{text-align:center;padding:60px 20px;color:var(--text2);grid-column:1/-1}
.err-icon{font-size:48px;margin-bottom:16px}
.retry-btn{margin-top:16px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius);padding:10px 24px;font-size:14px;cursor:pointer;font-family:var(--font)}
.retry-btn:hover{background:#cc0000}
.inst-badge{position:fixed;bottom:16px;right:16px;background:var(--bg3);
  border:1px solid var(--border);color:var(--text2);font-size:10px;
  padding:4px 10px;border-radius:20px;z-index:500}
.inst-badge span{color:#4caf50}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="goHome()">
    <div class="logo-icon">▶</div>
    <span class="logo-text">Inv<span>Tube</span></span>
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="검색어를 입력하세요..." autocomplete="off">
    <button onclick="doSearch()">🔍</button>
  </div>
</header>

<div id="app">
  <div id="home-page">
    <div class="page-title">🔥 인기 동영상 <span class="badge">TRENDING</span></div>
    <div id="trending-grid" class="video-grid"></div>
  </div>
  <div id="search-page" style="display:none">
    <div class="page-title" id="search-title">검색 결과</div>
    <div id="search-grid" class="video-grid"></div>
  </div>
  <div id="video-page" style="display:none">
    <div class="video-layout">
      <div>
        <div class="player-wrap" id="player-wrap">
          <div class="player-loading" id="player-loading">
            <div class="spinner"></div>
            <p id="load-msg">영상 로딩 중...</p>
          </div>
          <video id="main-video" controls preload="auto" style="display:none"></video>
        </div>
        <div class="video-info" id="video-info"></div>
      </div>
      <div>
        <div class="page-title">다음 영상</div>
        <div class="rec-list" id="rec-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div class="inst-badge">인스턴스: <span id="inst-url">연결 중...</span></div>

<script>
// ─── 인스턴스 관리 (브라우저에서 직접 호출) ───
const INSTANCES = [
  'https://inv.nadeko.net',
  'https://invidious.nerdvpn.de',
  'https://yt.cdaut.de',
  'https://invidious.lunar.icu',
  'https://iv.melmac.space',
  'https://invidious.slipfox.xyz',
  'https://invidious.fdn.fr',
  'https://invidious.privacydev.net',
  'https://invidious.protokolla.fi',
  'https://invidious.tiekoetter.com',
  'https://invidious.perennialte.ch',
  'https://yewtu.be',
  'https://vid.puffyan.us',
  'https://invidious.jing.rocks',
];

let goodInstance = null;

// 빠른 인스턴스 탐색 (병렬로 ping)
async function findFastInstance() {
  const shuffled = [...INSTANCES].sort(() => Math.random() - 0.5);
  const tests = shuffled.map(async (base) => {
    const url = base + '/api/v1/trending?fields=videoId&type=default';
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 5000);
    try {
      const r = await fetch(url, { signal: ctrl.signal });
      clearTimeout(t);
      if (!r.ok) throw new Error('bad status');
      const d = await r.json();
      const arr = Array.isArray(d) ? d : (d.videos || d.trending || d.items || []);
      if (!arr.length) throw new Error('empty');
      return base;
    } catch {
      clearTimeout(t);
      throw new Error(base + ' failed');
    }
  });
  // 제일 먼저 성공한 거 사용
  return Promise.any(tests);
}

async function getInstance() {
  if (goodInstance) return goodInstance;
  goodInstance = await findFastInstance();
  document.getElementById('inst-url').textContent = new URL(goodInstance).hostname;
  return goodInstance;
}

// 인스턴스 강제 재탐색
async function resetInstance() {
  goodInstance = null;
  return getInstance();
}

async function invFetch(path) {
  let base;
  try { base = await getInstance(); }
  catch { base = INSTANCES[Math.floor(Math.random() * INSTANCES.length)]; }

  const r = await fetch(base + '/api/v1' + path);
  if (!r.ok) {
    goodInstance = null; // 실패하면 다음엔 재탐색
    throw new Error('HTTP ' + r.status);
  }
  return r.json();
}

function toArray(d) {
  if (Array.isArray(d)) return d;
  return d.videos || d.trending || d.items || d.results ||
    Object.values(d).find(v => Array.isArray(v)) || [];
}

// ─── 유틸 ───
function fmtDur(s) {
  if (!s) return '';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  if (h) return h+':'+String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  return m+':'+String(ss).padStart(2,'0');
}
function fmtViews(n) {
  if (!n) return '';
  if (n>=1e8) return (n/1e8).toFixed(1)+'억';
  if (n>=1e4) return (n/1e4).toFixed(1)+'만';
  return n.toLocaleString();
}
function bestThumb(thumbs) {
  if (!thumbs || !thumbs.length) return '';
  const s = [...thumbs].sort((a,b) => (b.width||0)-(a.width||0));
  return (s.find(t => t.quality==='maxresdefault') || s[0]).url;
}
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── 페이지 전환 ───
function showPage(name) {
  document.getElementById('home-page').style.display = name==='home' ? '' : 'none';
  document.getElementById('search-page').style.display = name==='search' ? '' : 'none';
  document.getElementById('video-page').style.display = name==='video' ? '' : 'none';
}
function goHome() {
  document.getElementById('search-input').value = '';
  showPage('home');
}

// ─── 스켈레톤 ───
function skeletons(id, n=12) {
  document.getElementById(id).innerHTML = Array(n).fill(0).map(() => `
    <div class="sk-card">
      <div class="sk-thumb skeleton"></div>
      <div class="sk-info">
        <div class="sk-t1 skeleton"></div>
        <div class="sk-t2 skeleton"></div>
        <div class="sk-t3 skeleton"></div>
      </div>
    </div>`).join('');
}

// ─── 카드 ───
function cardHtml(v) {
  const t = bestThumb(v.videoThumbnails);
  return `
    <div class="video-card" onclick="loadVideo('${esc(v.videoId)}')">
      <div class="thumb-wrap">
        <img src="${esc(t)}" loading="lazy" onerror="this.style.background='#222'">
        ${v.lengthSeconds ? `<span class="duration">${fmtDur(v.lengthSeconds)}</span>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title">${esc(v.title)}</div>
        <div class="card-meta">
          <span>${esc(v.author)}</span>
          ${v.viewCount ? `<span>${fmtViews(v.viewCount)} 조회</span>` : ''}
          ${v.publishedText ? `<span>${esc(v.publishedText)}</span>` : ''}
        </div>
      </div>
    </div>`;
}

// ─── 트렌딩 ───
async function loadTrending() {
  skeletons('trending-grid');
  try {
    const data = await invFetch('/trending?region=KR&type=default');
    const list = toArray(data);
    if (!list.length) throw new Error('데이터 없음');
    document.getElementById('trending-grid').innerHTML = list.slice(0,24).map(cardHtml).join('');
  } catch (e) {
    // KR 실패 시 region 없이 재시도
    try {
      const data2 = await invFetch('/trending');
      const list2 = toArray(data2);
      if (!list2.length) throw new Error('데이터 없음');
      document.getElementById('trending-grid').innerHTML = list2.slice(0,24).map(cardHtml).join('');
    } catch (e2) {
      document.getElementById('trending-grid').innerHTML = `
        <div class="err-box">
          <div class="err-icon">😵</div>
          <p>트렌딩을 불러오지 못했어요</p>
          <p style="font-size:12px;margin-top:8px;color:#666">${esc(e2.message)}</p>
          <button class="retry-btn" onclick="goodInstance=null;loadTrending()">다시 시도</button>
        </div>`;
    }
  }
}

// ─── 검색 ───
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  showPage('search');
  document.getElementById('search-title').textContent = `"${q}" 검색 결과`;
  skeletons('search-grid');
  try {
    const data = await invFetch('/search?q=' + encodeURIComponent(q) + '&type=video&sort_by=relevance');
    const list = toArray(data);
    document.getElementById('search-grid').innerHTML = list.length
      ? list.map(cardHtml).join('')
      : '<div class="err-box"><div class="err-icon">🔍</div><p>검색 결과가 없어요</p></div>';
  } catch (e) {
    document.getElementById('search-grid').innerHTML = `
      <div class="err-box">
        <div class="err-icon">⚠️</div>
        <p>검색 실패: ${esc(e.message)}</p>
        <button class="retry-btn" onclick="doSearch()">다시 시도</button>
      </div>`;
  }
}

// ─── 비디오 로드 ───
async function loadVideo(videoId) {
  showPage('video');
  window.scrollTo({top:0,behavior:'smooth'});
  const video = document.getElementById('main-video');
  const loading = document.getElementById('player-loading');
  video.style.display = 'none';
  loading.style.display = 'flex';
  document.getElementById('video-info').innerHTML = '';
  document.getElementById('rec-list').innerHTML = '';

  const msgs = ['영상 정보 가져오는 중...','스트림 URL 확인 중...','최적 화질 선택 중...'];
  let mi = 0;
  const msgEl = document.getElementById('load-msg');
  const iv = setInterval(() => { msgEl.textContent = msgs[++mi % msgs.length]; }, 1500);

  try {
    const data = await invFetch('/videos/' + videoId +
      '?fields=title,author,description,publishedText,viewCount,likeCount,lengthSeconds,formatStreams,videoThumbnails,recommendedVideos');

    clearInterval(iv);

    // 스트림: 직접 URL 사용 (Invidious가 서빙), 안되면 Vercel 프록시로 래핑
    const streams = (data.formatStreams || [])
      .filter(s => s.type && s.type.includes('video/mp4'))
      .map(s => ({
        quality: s.qualityLabel || s.quality,
        directUrl: s.url,
        proxyUrl: '/api/proxy?url=' + encodeURIComponent(s.url),
      }));

    if (!streams.length) throw new Error('재생 가능한 스트림이 없습니다');

    // 720p 우선, 없으면 최고화질
    const best = streams.find(s => s.quality==='720p')
      || streams.find(s => s.quality==='480p')
      || streams[0];

    // 직접 URL 먼저 시도
    video.src = best.directUrl;
    video.style.display = 'block';
    loading.style.display = 'none';

    // 직접 URL 실패 시 프록시로 폴백
    video.onerror = () => {
      toast('직접 스트림 실패 → 프록시로 전환 중...');
      const cur = streams.find(s => s.directUrl === video.getAttribute('data-direct') || s.proxyUrl === video.src);
      if (cur && video.src !== cur.proxyUrl) {
        video.setAttribute('data-direct', cur.directUrl);
        video.src = cur.proxyUrl;
        video.play().catch(()=>{});
      }
    };
    video.setAttribute('data-direct', best.directUrl);
    video.play().catch(()=>{});

    // 영상 정보
    document.getElementById('video-info').innerHTML = `
      <h1 class="video-title-h">${esc(data.title||'')}</h1>
      <div class="video-meta-row">
        <span style="font-weight:600;color:var(--text)">${esc(data.author||'')}</span>
        ${data.viewCount ? `<span>조회수 ${fmtViews(data.viewCount)}회</span>` : ''}
        ${data.publishedText ? `<span>${esc(data.publishedText)}</span>` : ''}
        ${data.likeCount ? `<span>👍 ${fmtViews(data.likeCount)}</span>` : ''}
      </div>
      <div class="quality-row" id="quality-row">
        ${streams.map((s,i) => `
          <button class="quality-btn ${i===streams.indexOf(best)?'active':''}"
            onclick="setQuality(this,'${esc(s.directUrl)}','${esc(s.proxyUrl)}')">
            ${esc(s.quality)}
          </button>`).join('')}
      </div>
      ${data.description ? `
        <div class="desc-box" id="desc-box" onclick="this.classList.toggle('expanded')">
          ${esc(data.description).replace(/\n/g,'<br>').substring(0,600)}
        </div>` : ''}
    `;

    // 추천 영상
    if (data.recommendedVideos && data.recommendedVideos.length) {
      document.getElementById('rec-list').innerHTML =
        data.recommendedVideos.slice(0,15).map(v => {
          const t = bestThumb(v.videoThumbnails);
          return `
            <div class="rec-card" onclick="loadVideo('${esc(v.videoId)}')">
              <div class="rec-thumb">
                <img src="${esc(t)}" loading="lazy" onerror="this.style.background='#222'">
                ${v.lengthSeconds ? `<span class="rec-dur">${fmtDur(v.lengthSeconds)}</span>` : ''}
              </div>
              <div class="rec-info">
                <div class="rec-title">${esc(v.title)}</div>
                <div class="rec-meta">${esc(v.author||'')}</div>
              </div>
            </div>`;
        }).join('');
    }

  } catch (e) {
    clearInterval(iv);
    loading.innerHTML = `
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <p style="color:#aaa;margin-bottom:8px">영상을 불러오지 못했어요</p>
        <p style="color:#555;font-size:12px">${esc(e.message)}</p>
        <button class="retry-btn" style="margin-top:16px" onclick="loadVideo('${videoId}')">다시 시도</button>
      </div>`;
  }
}

function setQuality(btn, directUrl, proxyUrl) {
  const video = document.getElementById('main-video');
  const t = video.currentTime;
  video.src = directUrl;
  video.setAttribute('data-direct', directUrl);
  video.onerror = () => { video.src = proxyUrl; video.currentTime = t; video.play().catch(()=>{}); };
  video.currentTime = t;
  video.play().catch(()=>{});
  document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  toast('화질 변경됨');
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// 초기화
showPage('home');
loadTrending();
</script>
</body>
</html>
