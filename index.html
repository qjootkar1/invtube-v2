<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvTube</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #222;
    --border: #333;
    --text: #f1f1f1;
    --text2: #aaa;
    --accent: #ff0000;
    --accent2: #cc0000;
    --radius: 10px;
    --font: 'Space Grotesk', 'Noto Sans KR', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    height: 60px;
    display: flex; align-items: center;
    padding: 0 16px; gap: 16px;
  }
  .logo {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--text); flex-shrink: 0;
    cursor: pointer;
  }
  .logo-icon {
    width: 36px; height: 26px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon::after {
    content: '▶';
    color: #fff; font-size: 13px; margin-left: 2px;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .search-bar {
    flex: 1; max-width: 600px;
    display: flex; gap: 0;
    margin: 0 auto;
  }
  .search-bar input {
    flex: 1;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-right: none;
    border-radius: var(--radius) 0 0 var(--radius);
    color: var(--text);
    padding: 0 16px;
    font-size: 14px;
    font-family: var(--font);
    height: 40px;
    outline: none;
    transition: border-color .2s;
  }
  .search-bar input:focus { border-color: #555; }
  .search-bar input::placeholder { color: var(--text2); }
  .search-bar button {
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-left: none;
    border-radius: 0 var(--radius) var(--radius) 0;
    color: var(--text);
    padding: 0 16px;
    cursor: pointer;
    font-size: 16px;
    height: 40px;
    transition: background .2s;
  }
  .search-bar button:hover { background: var(--bg2); }

  /* ─── MAIN LAYOUT ─── */
  #app { padding: 24px 16px; max-width: 1400px; margin: 0 auto; }

  /* ─── PAGE TITLES ─── */
  .page-title {
    font-size: 18px; font-weight: 600;
    margin-bottom: 16px; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .page-title .badge {
    font-size: 11px; background: var(--accent);
    color: #fff; padding: 2px 8px; border-radius: 20px;
    font-weight: 500;
  }

  /* ─── GRID ─── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .video-card {
    cursor: pointer;
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    background: var(--bg2);
  }
  .video-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }

  .thumb-wrap {
    position: relative; width: 100%;
    aspect-ratio: 16/9; overflow: hidden;
    background: #1a1a1a;
  }
  .thumb-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .3s;
  }
  .video-card:hover .thumb-wrap img { transform: scale(1.04); }
  .duration {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,.85);
    color: #fff; font-size: 11px; font-weight: 600;
    padding: 2px 5px; border-radius: 4px;
  }

  .card-info { padding: 10px 12px 12px; }
  .card-title {
    font-size: 13.5px; font-weight: 500; line-height: 1.4;
    color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 6px;
  }
  .card-meta { font-size: 12px; color: var(--text2); }
  .card-meta span + span::before { content: ' · '; }

  /* ─── LOADING / SKELETON ─── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .skeleton-card { background: var(--bg2); border-radius: var(--radius); overflow: hidden; }
  .skeleton-thumb { width: 100%; aspect-ratio: 16/9; }
  .skeleton-info { padding: 10px 12px; }
  .skeleton-title { height: 14px; margin-bottom: 8px; }
  .skeleton-title2 { height: 14px; width: 70%; margin-bottom: 10px; }
  .skeleton-meta { height: 11px; width: 50%; }

  /* ─── VIDEO PAGE ─── */
  #video-page { display: none; }
  #video-page.active { display: block; }
  #home-page { }
  #home-page.hidden { display: none; }
  #search-page { display: none; }
  #search-page.active { display: block; }

  .video-layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .video-layout { grid-template-columns: 1fr; }
  }

  .player-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }
  .player-wrap video {
    width: 100%; height: 100%;
    background: #000;
  }
  .player-wrap iframe {
    width: 100%; height: 100%; border: none;
  }

  .player-loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; gap: 16px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .player-loading p { color: var(--text2); font-size: 14px; }

  .video-info { padding: 16px 0; }
  .video-title-h { font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }
  .video-meta-row {
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap; margin-bottom: 12px;
  }
  .video-meta-row span { font-size: 13px; color: var(--text2); }
  .channel-link {
    color: var(--text); font-weight: 600; font-size: 14px;
    text-decoration: none; cursor: pointer;
  }
  .channel-link:hover { color: var(--accent); }

  .quality-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .quality-btn {
    background: var(--bg3);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .2s;
    font-family: var(--font);
  }
  .quality-btn:hover, .quality-btn.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  .description-box {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13px; line-height: 1.6; color: var(--text2);
    max-height: 120px; overflow: hidden;
    position: relative; cursor: pointer;
    transition: max-height .3s;
  }
  .description-box.expanded { max-height: 600px; }
  .description-box::after {
    content: '더보기 ▾';
    position: absolute; bottom: 10px; right: 14px;
    font-size: 11px; color: var(--text); background: var(--bg2);
    padding: 2px 4px;
  }
  .description-box.expanded::after { content: '접기 ▴'; }

  /* ─── RECOMMENDED ─── */
  .recommended-list { display: flex; flex-direction: column; gap: 10px; }
  .rec-card {
    display: flex; gap: 10px;
    cursor: pointer; padding: 6px; border-radius: 8px;
    transition: background .15s;
  }
  .rec-card:hover { background: var(--bg2); }
  .rec-thumb {
    width: 160px; flex-shrink: 0;
    aspect-ratio: 16/9;
    border-radius: 6px; overflow: hidden;
    background: #1a1a1a; position: relative;
  }
  .rec-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .rec-dur {
    position: absolute; bottom: 4px; right: 4px;
    background: rgba(0,0,0,.85); color: #fff;
    font-size: 10px; font-weight: 600; padding: 1px 4px; border-radius: 3px;
  }
  .rec-info { flex: 1; min-width: 0; }
  .rec-title {
    font-size: 13px; font-weight: 500; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 4px;
  }
  .rec-meta { font-size: 11px; color: var(--text2); }

  /* ─── TOAST ─── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--bg3); color: var(--text);
    padding: 10px 20px; border-radius: 8px;
    font-size: 13px; z-index: 9999;
    transition: transform .3s;
    border: 1px solid var(--border);
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── ERROR ─── */
  .error-box {
    text-align: center; padding: 60px 20px; color: var(--text2);
  }
  .error-box .err-icon { font-size: 48px; margin-bottom: 16px; }
  .error-box p { margin-bottom: 8px; }
  .retry-btn {
    margin-top: 16px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    padding: 10px 24px; font-size: 14px;
    cursor: pointer; font-family: var(--font);
  }
  .retry-btn:hover { background: var(--accent2); }

  /* ─── INSTANCE BADGE ─── */
  .inst-badge {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); font-size: 10px;
    padding: 4px 10px; border-radius: 20px;
    z-index: 500;
  }
  .inst-badge span { color: #4caf50; }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">
    <div class="logo-icon"></div>
    <span class="logo-text">Inv<span>Tube</span></span>
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="검색어를 입력하세요..." autocomplete="off">
    <button onclick="doSearch()">🔍</button>
  </div>
</header>

<div id="app">
  <!-- 홈 페이지 -->
  <div id="home-page">
    <div class="page-title">🔥 인기 동영상 <span class="badge">TRENDING</span></div>
    <div id="trending-grid" class="video-grid"></div>
  </div>

  <!-- 검색 결과 -->
  <div id="search-page">
    <div class="page-title" id="search-title">검색 결과</div>
    <div id="search-grid" class="video-grid"></div>
  </div>

  <!-- 영상 페이지 -->
  <div id="video-page">
    <div class="video-layout">
      <div>
        <div class="player-wrap" id="player-wrap">
          <div class="player-loading" id="player-loading">
            <div class="spinner"></div>
            <p>영상 로딩 중...</p>
          </div>
          <video id="main-video" controls preload="auto" style="display:none"></video>
        </div>
        <div class="video-info" id="video-info"></div>
      </div>
      <div>
        <div class="page-title">다음 영상</div>
        <div class="recommended-list" id="recommended-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div class="inst-badge" id="inst-badge">인스턴스: <span id="inst-url">연결 중...</span></div>

<script>
const API = '/api/proxy';
let currentVideoId = null;
let currentStreams = [];

// ─── 유틸 ───
function formatDur(sec) {
  if (!sec) return '';
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function formatViews(n) {
  if (!n) return '';
  if (n >= 1e8) return (n/1e8).toFixed(1) + '억';
  if (n >= 1e4) return (n/1e4).toFixed(1) + '만';
  return n.toLocaleString();
}
function getBestThumb(thumbs) {
  if (!thumbs || !thumbs.length) return '';
  const sorted = [...thumbs].sort((a,b) => (b.width||0) - (a.width||0));
  // maxresdefault 제일 큰 것
  const hq = sorted.find(t => t.quality === 'maxresdefault' || t.quality === 'sddefault');
  return (hq || sorted[0]).url;
}
function toast(msg, dur = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ─── 페이지 전환 ───
function showPage(name) {
  document.getElementById('home-page').classList.remove('hidden');
  document.getElementById('search-page').classList.remove('active');
  document.getElementById('video-page').classList.remove('active');
  if (name === 'home') {
    document.getElementById('home-page').classList.remove('hidden');
    document.getElementById('search-page').style.display = 'none';
    document.getElementById('video-page').style.display = 'none';
    document.getElementById('home-page').style.display = '';
  } else if (name === 'search') {
    document.getElementById('home-page').style.display = 'none';
    document.getElementById('video-page').style.display = 'none';
    document.getElementById('search-page').style.display = '';
  } else if (name === 'video') {
    document.getElementById('home-page').style.display = 'none';
    document.getElementById('search-page').style.display = 'none';
    document.getElementById('video-page').style.display = '';
  }
}

function goHome() {
  document.getElementById('search-input').value = '';
  showPage('home');
}

// ─── 스켈레톤 ───
function renderSkeletons(containerId, count = 12) {
  const c = document.getElementById(containerId);
  c.innerHTML = Array(count).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skeleton-thumb skeleton"></div>
      <div class="skeleton-info">
        <div class="skeleton-title skeleton"></div>
        <div class="skeleton-title2 skeleton"></div>
        <div class="skeleton-meta skeleton"></div>
      </div>
    </div>
  `).join('');
}

// ─── 카드 렌더 ───
function renderVideoCard(v) {
  const thumb = getBestThumb(v.videoThumbnails);
  const dur = formatDur(v.lengthSeconds);
  return `
    <div class="video-card" onclick="loadVideo('${v.videoId}')">
      <div class="thumb-wrap">
        <img src="${thumb}" alt="${v.title}" loading="lazy" onerror="this.style.background='#222'">
        ${dur ? `<span class="duration">${dur}</span>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">
          <span>${v.author}</span>
          ${v.viewCount ? `<span>${formatViews(v.viewCount)} 조회</span>` : ''}
          ${v.publishedText ? `<span>${v.publishedText}</span>` : ''}
        </div>
      </div>
    </div>
  `;
}

// ─── 트렌딩 로드 ───
async function loadTrending() {
  renderSkeletons('trending-grid', 12);
  try {
    const res = await fetch(`${API}?type=trending&region=KR`);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('데이터 오류');
    document.getElementById('trending-grid').innerHTML = data.map(renderVideoCard).join('');
  } catch (e) {
    document.getElementById('trending-grid').innerHTML = `
      <div class="error-box" style="grid-column:1/-1">
        <div class="err-icon">😵</div>
        <p>트렌딩을 불러오지 못했어요</p>
        <p style="font-size:12px">${e.message}</p>
        <button class="retry-btn" onclick="loadTrending()">다시 시도</button>
      </div>`;
    toast('트렌딩 로드 실패 — 잠시 후 재시도');
  }
}

// ─── 검색 ───
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  showPage('search');
  document.getElementById('search-title').innerHTML = `"${q}" 검색 결과`;
  renderSkeletons('search-grid', 12);
  try {
    const res = await fetch(`${API}?type=search&q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('결과 없음');
    document.getElementById('search-grid').innerHTML = data.map(renderVideoCard).join('');
  } catch (e) {
    document.getElementById('search-grid').innerHTML = `
      <div class="error-box" style="grid-column:1/-1">
        <div class="err-icon">🔍</div>
        <p>검색 결과를 불러오지 못했어요</p>
        <button class="retry-btn" onclick="doSearch()">다시 시도</button>
      </div>`;
  }
}

// ─── 비디오 로드 ───
async function loadVideo(videoId) {
  currentVideoId = videoId;
  showPage('video');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const video = document.getElementById('main-video');
  const loading = document.getElementById('player-loading');
  video.style.display = 'none';
  loading.style.display = 'flex';
  document.getElementById('video-info').innerHTML = '';
  document.getElementById('recommended-list').innerHTML = '';

  // 로딩 텍스트 순환
  const msgs = ['영상 정보 가져오는 중...', '스트림 URL 확인 중...', '최적 화질 선택 중...'];
  let mi = 0;
  const msgEl = loading.querySelector('p');
  const msgInterval = setInterval(() => { msgEl.textContent = msgs[++mi % msgs.length]; }, 1500);

  try {
    const res = await fetch(`${API}?type=video&id=${videoId}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    clearInterval(msgInterval);
    currentStreams = data.streams || [];

    // 인스턴스 배지
    if (data.instance) {
      const u = new URL(data.instance);
      document.getElementById('inst-url').textContent = u.hostname;
    }

    // 화질 버튼 생성 (mp4 우선)
    const mp4Streams = currentStreams.filter(s => s.type && s.type.includes('mp4'));
    const streams = mp4Streams.length ? mp4Streams : currentStreams;

    // 최고 화질로 자동 재생
    const best = streams.find(s => s.quality === '720p') || streams.find(s => s.quality === '480p') || streams[0];
    if (!best) throw new Error('재생 가능한 스트림 없음');

    video.src = best.url;
    video.style.display = 'block';
    loading.style.display = 'none';

    // 영상 에러 시 다음 스트림 시도
    video.onerror = () => {
      toast('스트림 오류 — 다른 화질로 전환 중...');
      const idx = streams.indexOf(best);
      const next = streams[idx + 1];
      if (next) { video.src = next.url; video.play(); }
    };

    video.play().catch(() => {});

    // 정보 렌더
    document.getElementById('video-info').innerHTML = `
      <h1 class="video-title-h">${data.title || ''}</h1>
      <div class="video-meta-row">
        <span class="channel-link" onclick="goHome()">${data.author || ''}</span>
        ${data.viewCount ? `<span>조회수 ${formatViews(data.viewCount)}회</span>` : ''}
        ${data.publishedText ? `<span>${data.publishedText}</span>` : ''}
        ${data.likeCount ? `<span>👍 ${formatViews(data.likeCount)}</span>` : ''}
      </div>
      <div class="quality-row" id="quality-row">
        ${streams.map(s => `
          <button class="quality-btn ${s === best ? 'active' : ''}"
            onclick="changeQuality(this, '${s.url}')">
            ${s.quality || 'auto'}
          </button>
        `).join('')}
      </div>
      ${data.description ? `
        <div class="description-box" id="desc-box" onclick="toggleDesc()">
          ${data.description.replace(/\n/g, '<br>').substring(0, 800)}
        </div>
      ` : ''}
    `;

    // 추천 영상
    if (data.recommendedVideos && data.recommendedVideos.length) {
      document.getElementById('recommended-list').innerHTML =
        data.recommendedVideos.slice(0, 15).map(v => {
          const t = getBestThumb(v.videoThumbnails);
          return `
            <div class="rec-card" onclick="loadVideo('${v.videoId}')">
              <div class="rec-thumb">
                <img src="${t}" loading="lazy" onerror="this.style.background='#222'">
                ${v.lengthSeconds ? `<span class="rec-dur">${formatDur(v.lengthSeconds)}</span>` : ''}
              </div>
              <div class="rec-info">
                <div class="rec-title">${v.title}</div>
                <div class="rec-meta">${v.author || ''}</div>
              </div>
            </div>
          `;
        }).join('');
    }

  } catch (e) {
    clearInterval(msgInterval);
    loading.innerHTML = `
      <div style="text-align:center">
        <div class="err-icon" style="font-size:48px;margin-bottom:16px">⚠️</div>
        <p style="color:#aaa;margin-bottom:8px">영상을 불러오지 못했어요</p>
        <p style="color:#666;font-size:12px">${e.message}</p>
        <button class="retry-btn" style="margin-top:16px" onclick="loadVideo('${videoId}')">다시 시도</button>
      </div>
    `;
    toast(`오류: ${e.message}`);
  }
}

// ─── 화질 변경 ───
function changeQuality(btn, url) {
  const video = document.getElementById('main-video');
  const curTime = video.currentTime;
  video.src = url;
  video.currentTime = curTime;
  video.play();
  document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  toast('화질 변경됨');
}

// ─── 설명 토글 ───
function toggleDesc() {
  document.getElementById('desc-box')?.classList.toggle('expanded');
}

// ─── 검색 엔터키 ───
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ─── 인스턴스 상태 ───
async function checkInstance() {
  try {
    const res = await fetch(`${API}?type=ping`);
    const d = await res.json();
    if (d.instance) {
      const u = new URL(d.instance);
      document.getElementById('inst-url').textContent = u.hostname;
    }
  } catch {}
}

// ─── 초기화 ───
showPage('home');
loadTrending();
checkInstance();
</script>
</body>
</html>
